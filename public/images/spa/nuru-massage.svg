<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="50%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#bfdbfe" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#bfdbfe" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#dbeafe" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#dbeafe" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Water/gel waves -->
      <path d="M200 340 Q270 310 340 340 Q410 370 480 340 Q550 310 600 340 L600 420 L200 420Z" fill="#60a5fa" opacity="0.35"/>
      <path d="M180 310 Q260 278 340 310 Q420 342 500 310 Q560 285 620 310 L620 400 L180 400Z" fill="#3b82f6" opacity="0.3"/>
      <!-- Japanese wave circles -->
      <path d="M400 200 Q430 175 400 160 Q370 175 400 200Z" fill="#93c5fd" opacity="0.6"/>
      <path d="M400 200 Q440 185 450 210 Q440 235 400 225Z" fill="#60a5fa" opacity="0.55"/>
      <path d="M400 200 Q360 185 350 210 Q360 235 400 225Z" fill="#60a5fa" opacity="0.55"/>
      <!-- Ripple rings -->
      <circle cx="400" cy="310" r="40" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
      <circle cx="400" cy="310" r="65" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
      <circle cx="400" cy="310" r="90" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.25"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#3b82f6" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1e3a8a" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#1e3a8a" font-weight="700">Nuru Massage</text>

  <!-- Subtitle -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" letter-spacing="2">Japanese · Gel · Full Sensory</text>

  <!-- Bottom decorative line -->
  <line x1="320" y1="482" x2="480" y2="482" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
</svg>