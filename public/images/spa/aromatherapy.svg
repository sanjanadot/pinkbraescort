<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#86efac" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#86efac" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#86efac" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#bbf7d0" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#bbf7d0" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Essential oil bottle -->
      <rect x="375" y="230" width="50" height="90" rx="8" fill="#4ade80" opacity="0.7"/>
      <rect x="383" y="215" width="34" height="20" rx="4" fill="#16a34a" opacity="0.75"/>
      <rect x="390" y="200" width="20" height="18" rx="3" fill="#15803d" opacity="0.8"/>
      <!-- Drops falling -->
      <ellipse cx="340" cy="330" rx="12" ry="16" fill="#4ade80" opacity="0.6"/>
      <ellipse cx="460" cy="320" rx="10" ry="14" fill="#22c55e" opacity="0.55"/>
      <ellipse cx="355" cy="370" rx="8" ry="11" fill="#86efac" opacity="0.5"/>
      <!-- Leaf decorations -->
      <path d="M260 250 Q280 220 310 240 Q290 270 260 250Z" fill="#4ade80" opacity="0.5"/>
      <path d="M530 260 Q550 230 580 250 Q560 280 530 260Z" fill="#22c55e" opacity="0.45"/>
      <!-- Scent spirals -->
      <path d="M400 180 Q415 165 400 150 Q385 135 400 120" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M420 175 Q435 158 420 143 Q405 128 420 113" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#22c55e" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#14532d" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#14532d" font-weight="700">Aromatherapy Massage</text>

  <!-- Subtitle -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22c55e" letter-spacing="2">Scented · Calming · Blissful</text>

  <!-- Bottom decorative line -->
  <line x1="320" y1="482" x2="480" y2="482" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
</svg>