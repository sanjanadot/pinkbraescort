<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#bbf7d0" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#bbf7d0" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#bbf7d0" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#dcfce7" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#dcfce7" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Wrap / cocoon shape -->
      <ellipse cx="400" cy="300" rx="90" ry="110" fill="#4ade80" opacity="0.35"/>
      <ellipse cx="400" cy="300" rx="70" ry="88" fill="#22c55e" opacity="0.3"/>
      <!-- Scrub particles -->
      <circle cx="370" cy="260" r="5" fill="#16a34a" opacity="0.55"/>
      <circle cx="390" cy="250" r="4" fill="#15803d" opacity="0.5"/>
      <circle cx="415" cy="260" r="6" fill="#16a34a" opacity="0.55"/>
      <circle cx="430" cy="280" r="4" fill="#22c55e" opacity="0.5"/>
      <circle cx="425" cy="305" r="5" fill="#15803d" opacity="0.5"/>
      <circle cx="375" cy="310" r="4" fill="#16a34a" opacity="0.5"/>
      <circle cx="365" cy="285" r="5" fill="#22c55e" opacity="0.55"/>
      <circle cx="405" cy="320" r="4" fill="#16a34a" opacity="0.5"/>
      <!-- Leaves -->
      <path d="M250 220 Q270 195 295 210 Q278 235 250 220Z" fill="#4ade80" opacity="0.5"/>
      <path d="M555 215 Q575 190 600 205 Q583 230 555 215Z" fill="#22c55e" opacity="0.45"/>
      <!-- Sparkle glow dots -->
      <circle cx="240" cy="330" r="5" fill="#86efac" opacity="0.5"/>
      <circle cx="565" cy="325" r="5" fill="#4ade80" opacity="0.45"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#16a34a" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#14532d" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#14532d" font-weight="700">Body Scrub & Wrap</text>

  <!-- Subtitle -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#16a34a" letter-spacing="2">Exfoliate · Hydrate · Glow</text>

  <!-- Bottom decorative line -->
  <line x1="320" y1="482" x2="480" y2="482" stroke="#16a34a" stroke-width="1.5" opacity="0.4"/>
</svg>