<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="50%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#fde68a" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#fde68a" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#fef3c7" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#fef3c7" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Lotus flower -->
      <ellipse cx="400" cy="330" rx="30" ry="15" fill="#fde047" opacity="0.7"/>
      <path d="M400 260 Q420 295 400 330 Q380 295 400 260Z" fill="#facc15" opacity="0.75"/>
      <path d="M340 280 Q375 300 400 330 Q370 295 340 280Z" fill="#eab308" opacity="0.65"/>
      <path d="M460 280 Q425 300 400 330 Q430 295 460 280Z" fill="#eab308" opacity="0.65"/>
      <path d="M320 310 Q360 315 400 330 Q360 320 320 310Z" fill="#fbbf24" opacity="0.55"/>
      <path d="M480 310 Q440 315 400 330 Q440 320 480 310Z" fill="#fbbf24" opacity="0.55"/>
      <!-- Acupressure dots -->
      <circle cx="300" cy="220" r="7" fill="#eab308" opacity="0.55"/>
      <circle cx="500" cy="220" r="7" fill="#eab308" opacity="0.55"/>
      <circle cx="280" cy="300" r="5" fill="#facc15" opacity="0.5"/>
      <circle cx="520" cy="300" r="5" fill="#facc15" opacity="0.5"/>
      <!-- Om symbol hint -->
      <circle cx="400" cy="195" r="22" fill="none" stroke="#eab308" stroke-width="3" opacity="0.5"/>
      <circle cx="400" cy="195" r="8" fill="#eab308" opacity="0.4"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#eab308" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#713f12" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#713f12" font-weight="700">Thai Massage</text>

  <!-- Subtitle -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#eab308" letter-spacing="2">Stretch · Energise · Balance</text>

  <!-- Bottom decorative line -->
  <line x1="320" y1="482" x2="480" y2="482" stroke="#eab308" stroke-width="1.5" opacity="0.4"/>
</svg>