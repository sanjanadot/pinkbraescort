<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6"/>
      <stop offset="50%" stop-color="#fecdd3"/>
      <stop offset="100%" stop-color="#fda4af"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fecdd3" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fda4af" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#fda4af" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#fda4af" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#fecdd3" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#fecdd3" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Muscle/pressure illustration -->
      <ellipse cx="400" cy="295" rx="100" ry="60" fill="#fda4af" opacity="0.5"/>
      <path d="M310 270 Q360 230 420 250 Q480 270 470 310 Q440 350 380 345 Q320 340 310 300 Z" fill="#f43f5e" opacity="0.65"/>
      <!-- Pressure arrow down -->
      <path d="M400 170 L400 240" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
      <polygon points="400,255 388,235 412,235" fill="#e11d48"/>
      <!-- Lines representing muscle fibers -->
      <line x1="330" y1="290" x2="470" y2="290" stroke="#fff" stroke-width="2.5" opacity="0.5"/>
      <line x1="340" y1="308" x2="460" y2="308" stroke="#fff" stroke-width="2" opacity="0.4"/>
      <line x1="350" y1="325" x2="450" y2="325" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
      <!-- Sparkle elements -->
      <circle cx="230" cy="190" r="7" fill="#fda4af" opacity="0.5"/>
      <circle cx="570" cy="195" r="5" fill="#fb7185" opacity="0.45"/>
      <circle cx="220" cy="340" r="4" fill="#f43f5e" opacity="0.4"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#f43f5e" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#881337" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#881337" font-weight="700">Deep Tissue Massage</text>

  <!-- Subtitle -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f43f5e" letter-spacing="2">Firm · Therapeutic · Healing</text>

  <!-- Bottom decorative line -->
  <line x1="320" y1="482" x2="480" y2="482" stroke="#f43f5e" stroke-width="1.5" opacity="0.4"/>
</svg>