<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="50%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fbcfe8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#fbcfe8" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#fbcfe8" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#fce7f3" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#fce7f3" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Two intertwined forms -->
      <ellipse cx="375" cy="290" rx="70" ry="50" fill="#e879f9" opacity="0.45"/>
      <ellipse cx="425" cy="310" rx="70" ry="50" fill="#d946ef" opacity="0.4"/>
      <!-- Heart shape center -->
      <path d="M400 340 Q385 325 375 310 Q365 295 375 285 Q385 275 400 290 Q415 275 425 285 Q435 295 425 310 Q415 325 400 340Z" fill="#c026d3" opacity="0.65"/>
      <!-- Sparkles -->
      <path d="M320 230 L324 242 L320 254 L316 242Z" fill="#e879f9" opacity="0.6"/>
      <path d="M480 240 L484 252 L480 264 L476 252Z" fill="#d946ef" opacity="0.55"/>
      <path d="M290 320 L294 329 L290 338 L286 329Z" fill="#f0abfc" opacity="0.5"/>
      <circle cx="540" cy="290" r="5" fill="#e879f9" opacity="0.5"/>
      <circle cx="260" cy="280" r="6" fill="#d946ef" opacity="0.45"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#d946ef" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#701a75" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#701a75" font-weight="700">B2B Massage</text>

  <!-- Subtitle -->
