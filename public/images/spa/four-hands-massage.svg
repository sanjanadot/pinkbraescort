<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="50%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fecdd3" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#fecdd3" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#fecdd3" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#ffe4e6" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#ffe4e6" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- 4 hands stylised -->
      <path d="M280 310 Q320 270 360 295 Q340 330 300 345 Z" fill="#fda4af" opacity="0.65"/>
      <path d="M520 310 Q480 270 440 295 Q460 330 500 345 Z" fill="#fda4af" opacity="0.65"/>
      <path d="M290 350 Q340 320 380 345 Q360 380 310 385 Z" fill="#fb7185" opacity="0.55"/>
      <path d="M510 350 Q460 320 420 345 Q440 380 490 385 Z" fill="#fb7185" opacity="0.55"/>
      <!-- Center body shape (stylised) -->
      <ellipse cx="400" cy="310" rx="55" ry="75" fill="#fecdd3" opacity="0.5"/>
      <!-- Synchronise arrows -->
      <path d="M350 240 Q375 225 400 225 Q425 225 450 240" stroke="#e11d48" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55"/>
      <circle cx="240" cy="210" r="7" fill="#fda4af" opacity="0.5"/>
      <circle cx="560" cy="210" r="7" fill="#fda4af" opacity="0.5"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#e11d48" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#881337" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#881337" font-weight="700">Four Hands Massage</text>

  <!-- Subtitle -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e11d48" letter-spacing="2">Duo · Synchronised · Luxury</text>

  <!-- Bottom decorative line -->
  <line x1="320" y1="482" x2="480" y2="482" stroke="#e11d48" stroke-width="1.5" opacity="0.4"/>
</svg>