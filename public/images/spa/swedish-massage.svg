<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="50%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbcfe8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f9a8d4" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#f9a8d4" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#f9a8d4" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#fbcfe8" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#fbcfe8" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Hands with waves -->
      <ellipse cx="400" cy="310" rx="90" ry="30" fill="#f9a8d4" opacity="0.5"/>
      <path d="M340 290 Q380 260 420 280 Q460 300 440 320 Q400 340 360 320 Z" fill="#ec4899" opacity="0.7"/>
      <path d="M310 250 Q360 210 420 240 Q480 270 460 300 Q410 330 360 310 Q310 290 310 250Z" fill="#db2777" opacity="0.5"/>
      <!-- Wave lines -->
      <path d="M280 360 Q310 345 340 360 Q370 375 400 360 Q430 345 460 360 Q490 375 520 360" stroke="#f472b6" stroke-width="3" fill="none" opacity="0.6"/>
      <path d="M300 385 Q330 370 360 385 Q390 400 420 385 Q450 370 480 385" stroke="#ec4899" stroke-width="2.5" fill="none" opacity="0.5"/>
      <!-- Decorative dots -->
      <circle cx="240" cy="200" r="8" fill="#f9a8d4" opacity="0.5"/>
      <circle cx="560" cy="200" r="6" fill="#f9a8d4" opacity="0.5"/>
      <circle cx="210" cy="320" r="5" fill="#f472b6" opacity="0.4"/>
      <circle cx="590" cy="310" r="7" fill="#f472b6" opacity="0.4"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#ec4899" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#9d174d" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#9d174d" font-weight="700">Swedish Full Body</text>

  <!-- Subtitle -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ec4899" letter-spacing="2">Gentle · Relaxing · Restorative</text>

  <!-- Bottom decorative line -->
  <line x1="320" y1="482" x2="480" y2="482" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
</svg>