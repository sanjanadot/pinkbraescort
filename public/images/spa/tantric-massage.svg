<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="50%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#bottom-fade)"/>

  <!-- Decorative bg circles -->
  <circle cx="100" cy="100" r="120" fill="#ddd6fe" opacity="0.25"/>
  <circle cx="700" cy="400" r="100" fill="#ddd6fe" opacity="0.2"/>
  <circle cx="750" cy="80" r="70" fill="#ede9fe" opacity="0.2"/>
  <circle cx="50" cy="430" r="80" fill="#ede9fe" opacity="0.18"/>

  <!-- Service Illustration -->
  
      <!-- Chakra / mandala -->
      <circle cx="400" cy="295" r="70" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
      <circle cx="400" cy="295" r="50" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.55"/>
      <circle cx="400" cy="295" r="30" fill="#7c3aed" opacity="0.3"/>
      <circle cx="400" cy="295" r="12" fill="#6d28d9" opacity="0.5"/>
      <!-- 8 petals -->
      <line x1="400.0" y1="330.0" x2="400.0" y2="363.0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/><line x1="424.7" y1="319.7" x2="448.1" y2="343.1" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/><line x1="435.0" y1="295.0" x2="468.0" y2="295.0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/><line x1="424.7" y1="270.3" x2="448.1" y2="246.9" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/><line x1="400.0" y1="260.0" x2="400.0" y2="227.0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/><line x1="375.3" y1="270.3" x2="351.9" y2="246.9" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/><line x1="365.0" y1="295.0" x2="332.0" y2="295.0" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/><line x1="375.3" y1="319.7" x2="351.9" y2="343.1" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
      <!-- Outer glow dots -->
      <circle cx="260" cy="200" r="6" fill="#a78bfa" opacity="0.5"/>
      <circle cx="540" cy="200" r="6" fill="#8b5cf6" opacity="0.5"/>
      <circle cx="230" cy="330" r="5" fill="#7c3aed" opacity="0.4"/>
      <circle cx="570" cy="330" r="5" fill="#7c3aed" opacity="0.4"/>
    

  <!-- Top badge -->
  <rect x="30" y="28" width="180" height="36" rx="18" fill="#7c3aed" opacity="0.15"/>
  <text x="120" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2e1065" font-weight="600" opacity="0.8">Pink Bra Spa</text>

  <!-- Title -->
  <text x="400" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#2e1065" font-weight="700">Tantric Massage</text>

